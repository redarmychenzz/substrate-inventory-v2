<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Team1 基板 list</title>
<!-- 圖示 / 桌面 icon -->
<link rel="icon" type="image/svg+xml" href="assets/icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/icon-16.png">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<!-- iOS 全螢幕 / 狀態列（消除加入主畫面後的上下白邊） -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="基板庫存">
<meta name="theme-color" content="#0a0e18" id="themeColorMeta">
<script>
  // 主題初始化（避免閃爍）
  (function(){
    var t = localStorage.getItem('inv_theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<style>
  :root{
    --ease:cubic-bezier(0.22,1,0.36,1);
    --ease-close:cubic-bezier(0.4,0,0.25,1);
    --blue:#0A84FF;   --blue-soft:rgba(10,132,255,.14);  --blue-line:rgba(10,132,255,.45);
    --green:#2FBF6E;  --green-soft:rgba(47,191,110,.16); --green-line:rgba(47,191,110,.5);
    --amber:#F59E0B;  --amber-soft:rgba(245,158,11,.16); --amber-line:rgba(245,158,11,.55);
    --red:#FF3B30;
    --carrier-bg:rgba(99,91,178,.12); --carrier-tx:#5f56a0; --carrier-line:rgba(99,91,178,.32);
  }
  /* ── 淺色（預設） ── */
  html[data-theme="light"]{
    --ink:#1c2430;    --ink-2:#5c6b7a;   --ink-3:#93a1b0;
    --card:rgba(255,255,255,.62);
    --card-strong:rgba(255,255,255,.80);
    --hair:rgba(120,140,165,.18);
    --glass-border:rgba(255,255,255,.72);
    --glass-sheen:linear-gradient(140deg,rgba(255,255,255,.55),rgba(255,255,255,0) 42%);
    --dock-bg:rgba(255,255,255,.46);
    --dock-border:rgba(255,255,255,.75);
    --shadow:0 10px 30px -12px rgba(31,58,95,.28);
    --shadow-sm:0 4px 14px -6px rgba(31,58,95,.22);
    --total-grad:linear-gradient(160deg,#20303f,#41576d);
    --glass-hi:rgba(255,255,255,.75);
    --bg-solid:#e7edf6;
    --body-bg:
      radial-gradient(125% 90% at 10% -8%, #bcd7fb 0%, rgba(188,215,251,0) 50%),
      radial-gradient(120% 85% at 108% 0%, #bdeecd 0%, rgba(189,238,205,0) 46%),
      radial-gradient(150% 100% at 50% 114%, #ddd3fb 0%, rgba(221,211,251,0) 55%),
      radial-gradient(120% 80% at 88% 55%, #fce4f0 0%, rgba(252,228,240,0) 45%),
      linear-gradient(165deg,#eef3fb 0%, #e6edf7 100%);
  }
  /* ── 深色 ── */
  html[data-theme="dark"]{
    --ink:#e7eef6;    --ink-2:#a3b4c6;   --ink-3:#6c7e91;
    --card:rgba(28,38,54,.55);
    --card-strong:rgba(30,41,58,.74);
    --hair:rgba(255,255,255,.08);
    --glass-border:rgba(255,255,255,.10);
    --glass-sheen:linear-gradient(140deg,rgba(255,255,255,.12),rgba(255,255,255,0) 42%);
    --dock-bg:rgba(28,38,54,.52);
    --dock-border:rgba(255,255,255,.14);
    --shadow:0 12px 34px -12px rgba(0,0,0,.6);
    --shadow-sm:0 6px 18px -8px rgba(0,0,0,.55);
    --total-grad:linear-gradient(160deg,#eaf1f9,#a9bccf);
    --glass-hi:rgba(255,255,255,.18);
    --bg-solid:#0a0e18;
    --carrier-bg:rgba(150,140,235,.16); --carrier-tx:#b7abf2; --carrier-line:rgba(150,140,235,.34);
    --body-bg:
      radial-gradient(120% 80% at 15% -5%, #1b3554 0%, rgba(27,53,84,0) 55%),
      radial-gradient(120% 80% at 100% 0%, #123a2c 0%, rgba(18,58,44,0) 50%),
      radial-gradient(140% 90% at 50% 110%, #241a44 0%, rgba(36,26,68,0) 55%),
      linear-gradient(180deg,#0c1220 0%, #0a0e18 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;}
  /* 背景放在根元素 → 覆蓋 iOS 安全區/overscroll，消除上下白邊。
     關鍵：iOS overscroll 只吃 background-color（不吃漸層 image），故補一層純色 */
  html{background:var(--body-bg);background-color:var(--bg-solid);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI","PingFang TC","Noto Sans TC",system-ui,sans-serif;
    color:var(--ink);
    background:transparent;
    min-height:100dvh;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    transition:color .3s ease;
  }
  .app{
    max-width:520px;margin:0 auto;
    padding:calc(env(safe-area-inset-top) + 14px) 16px calc(env(safe-area-inset-bottom) + 108px);
  }
  .page{display:none;animation:fade .32s ease;}
  .page.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* ── HERO ── */
  .hero{
    position:relative;overflow:hidden;
    background:var(--card);
    -webkit-backdrop-filter:saturate(200%) blur(30px);backdrop-filter:saturate(200%) blur(30px);
    border:1px solid var(--glass-border);
    border-radius:26px;
    box-shadow:var(--shadow), inset 0 1.5px 0 var(--glass-hi), inset 0 -18px 34px -22px rgba(90,120,170,.22);
    padding:18px 20px 18px;
    margin-bottom:16px;
  }
  /* 頂部斜向高光 + 邊緣反光，營造液態玻璃立體感 */
  .hero::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:linear-gradient(150deg, var(--glass-hi) 0%, rgba(255,255,255,0) 38%),
               radial-gradient(120% 60% at 50% -10%, var(--glass-hi) 0%, rgba(255,255,255,0) 45%);
    opacity:.85;}
  .hero-top{display:flex;align-items:center;gap:11px;margin-bottom:14px;}
  .hero-badge{
    width:32px;height:32px;border-radius:10px;flex:none;
    display:grid;place-items:center;
    background:linear-gradient(145deg,var(--blue),#4aa3ff);
    box-shadow:0 5px 14px -5px rgba(10,132,255,.7);color:#fff;
  }
  .hero-title{font-size:19px;font-weight:800;letter-spacing:.2px;line-height:1.1;}
  .hero-title small{display:block;font-size:11px;font-weight:500;color:var(--ink-3);letter-spacing:.2px;margin-top:3px;}
  .hero-actions{margin-left:auto;flex:none;display:flex;gap:8px;}
  .hero-btn{
    flex:none;width:38px;height:38px;border-radius:12px;
    border:1px solid var(--glass-border);background:var(--card);
    display:grid;place-items:center;cursor:pointer;color:var(--ink-2);
    -webkit-backdrop-filter:saturate(180%) blur(10px);backdrop-filter:saturate(180%) blur(10px);
    box-shadow:inset 0 1px 0 var(--glass-hi);
    transition:transform .3s var(--ease), color .25s, background .25s;
  }
  .hero-btn:active{transform:scale(.9);}
  .hero-btn svg{width:19px;height:19px;}
  .refresh-btn.spinning{pointer-events:none;color:var(--blue);}
  .refresh-btn.spinning svg{animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .hero-body{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;position:relative;z-index:1;}
  .total{display:flex;align-items:baseline;gap:7px;}
  .total .num{font-size:56px;font-weight:800;line-height:.86;letter-spacing:-2px;
    background:var(--total-grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .total .unit{font-size:16px;font-weight:600;color:var(--ink-3);}
  .wh-pills{display:flex;flex-direction:column;gap:8px;}
  .wh-pill{
    display:flex;align-items:center;gap:7px;
    padding:7px 14px;border-radius:999px;color:#fff;font-weight:700;font-size:14px;
    letter-spacing:.3px;white-space:nowrap;box-shadow:var(--shadow-sm);
  }
  .wh-pill .n{font-variant-numeric:tabular-nums;font-size:15px;}
  .wh-pill .u{font-size:11px;font-weight:600;opacity:.85;}
  .wh-pill.blue{background:linear-gradient(140deg,#0A84FF,#3aa0ff);}
  .wh-pill.green{background:linear-gradient(140deg,#25b466,#43cf82);}

  /* ── SIZE LIST ── */
  .list-head{display:flex;align-items:center;gap:8px;padding:2px 6px 10px;}
  .list-head .t{font-size:12px;font-weight:700;color:var(--ink-2);letter-spacing:1px;}
  .size-list{display:flex;flex-direction:column;gap:11px;}

  .size-item{
    background:var(--card);
    -webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);
    border:1px solid var(--hair);
    border-radius:20px;
    box-shadow:var(--shadow-sm);
    overflow:hidden;
    transition:border-color .3s var(--ease), box-shadow .3s var(--ease), background .3s;
  }
  .size-item.open{border-color:var(--blue-line);box-shadow:0 14px 34px -14px rgba(10,132,255,.42);}

  .size-row{display:flex;align-items:center;gap:10px;padding:14px 14px;cursor:pointer;user-select:none;}
  .size-icon{
    width:32px;height:32px;border-radius:10px;flex:none;
    display:grid;place-items:center;
    background:linear-gradient(150deg,rgba(10,132,255,.14),rgba(47,191,110,.12));
    border:1px solid var(--glass-border);
    color:var(--blue);transition:transform .34s var(--ease);
  }
  .size-icon svg{width:17px;height:17px;}
  .size-item.open .size-icon{transform:rotate(-8deg) scale(1.06);}
  .size-meta{flex:1;min-width:0;}
  .size-name{font-size:16px;font-weight:700;letter-spacing:.2px;font-variant-numeric:tabular-nums;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .size-badges{display:flex;gap:6px;flex:none;align-items:center;}
  .mini{
    display:inline-flex;align-items:baseline;gap:3px;
    padding:4px 8px;border-radius:9px;font-size:11px;font-weight:700;line-height:1;
    border:1.4px solid;font-variant-numeric:tabular-nums;
  }
  .mini .lab{font-size:9.5px;font-weight:700;letter-spacing:.2px;}
  .mini.blue{color:var(--blue);border-color:var(--blue-line);background:var(--blue-soft);}
  .mini.green{color:#1f9c56;border-color:var(--green-line);background:var(--green-soft);}
  .mini.amber{color:#b9740a;border-color:var(--amber-line);background:var(--amber-soft);}
  html[data-theme="dark"] .mini.green{color:#4fd68c;}
  html[data-theme="dark"] .mini.amber{color:#f5b955;}
  .mini.zero{opacity:.4;}
  .chev{width:20px;height:20px;flex:none;color:var(--ink-3);
    transition:transform .34s var(--ease);margin-left:2px;}
  .size-item.open .chev{transform:rotate(90deg);color:var(--blue);}
  /* 窄手機：進一步壓縮，確保尺寸數字完整不重疊 */
  @media (max-width:430px){
    .size-row{gap:8px;padding:13px 12px;}
    .size-icon{width:30px;height:30px;}
    .size-icon svg{width:16px;height:16px;}
    .size-name{font-size:15px;}
    .size-badges{gap:4px;}
    .mini{padding:3px 6px;font-size:10.5px;}
    .mini .lab{font-size:9px;}
    .chev{width:18px;height:18px;margin-left:0;}
  }

  /* ── EXPAND (參考記帳網頁：height 動畫 + 內容 stagger) ── */
  .detail{overflow:hidden;height:0;transition:height 340ms var(--ease);}
  .detail-pad{padding:2px 12px 14px;}
  .reveal{opacity:0;transform:translateY(8px);
    transition:opacity 300ms ease-out, transform 300ms var(--ease);}

  .swipe-hint{display:flex;align-items:center;gap:6px;justify-content:center;
    font-size:10.5px;color:var(--ink-3);padding:2px 0 9px;letter-spacing:.4px;}
  .swipe-hint svg{opacity:.7;}

  .carousel{
    display:flex;gap:11px;overflow-x:auto;scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
    padding:2px 2px 4px;margin:0 -2px;
  }
  .carousel::-webkit-scrollbar{display:none;}
  .lot-card{
    scroll-snap-align:center;flex:0 0 100%;
    background:var(--card-strong);
    border:1px solid var(--glass-border);
    border-radius:17px;box-shadow:var(--shadow-sm);
    padding:14px 15px 15px;
  }
  .lot-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px;min-height:26px;}
  .tag{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:999px;
    font-size:11.5px;font-weight:700;line-height:1;}
  .tag.blue{background:var(--blue);color:#fff;}
  .tag.green{background:var(--green);color:#fff;}
  .tag.carrier{background:var(--carrier-bg);color:var(--carrier-tx);border:1px solid var(--carrier-line);cursor:default;}
  .tag.exp-no{margin-left:auto;background:var(--red);color:#fff;box-shadow:0 4px 12px -4px rgba(255,59,48,.6);}

  .fields{display:flex;flex-direction:column;}
  .field{display:flex;gap:12px;padding:9px 0;border-top:1px solid var(--hair);}
  .field:first-child{border-top:none;padding-top:2px;}
  .field .k{flex:none;width:46px;font-size:11.5px;font-weight:700;color:var(--ink-3);letter-spacing:.5px;padding-top:1px;}
  .field .v{flex:1;min-width:0;font-size:13.5px;line-height:1.5;color:var(--ink);word-break:break-word;}
  .field .v.mono{font-family:"SF Mono",ui-monospace,"Menlo",monospace;font-size:13px;letter-spacing:.2px;}
  .field .v.dim{color:var(--ink-3);}

  .car-ctrl{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 0 2px;}
  .dots{display:flex;gap:5px;justify-content:center;}
  .dot{width:6px;height:6px;border-radius:999px;background:var(--ink-3);opacity:.3;transition:all .25s;}
  .dot.on{opacity:1;width:17px;background:var(--blue);}
  /* 批號切換箭頭：手機隱藏（用滑動），電腦版顯示 */
  .car-arrow{
    display:none;width:30px;height:30px;flex:none;border-radius:50%;cursor:pointer;
    align-items:center;justify-content:center;
    border:1px solid var(--glass-border);background:var(--card-strong);
    -webkit-backdrop-filter:saturate(180%) blur(12px);backdrop-filter:saturate(180%) blur(12px);
    box-shadow:var(--shadow-sm);color:var(--ink-2);
    transition:color .2s, border-color .2s, opacity .2s, transform .12s;
  }
  .car-arrow svg{width:16px;height:16px;}
  .car-arrow:hover{color:var(--blue);border-color:var(--blue-line);}
  .car-arrow:active{transform:scale(.9);}
  .car-arrow.off{opacity:.3;pointer-events:none;}
  @media (min-width:900px){
    .car-arrow{display:inline-flex;}
    .swipe-hint{display:none;}
  }

  /* ── 6012：hero（沿用基板 list 的 total + 藥丸樣式） ── */
  .total-wrap{display:flex;flex-direction:column;}
  .total-cap{font-size:11px;font-weight:700;color:var(--ink-3);letter-spacing:.5px;margin-bottom:5px;}
  .wh-pill.amber{background:linear-gradient(140deg,#f0930a,#f7b64a);}

  /* ── 6012：紀錄列表 ── */
  .sec-label{display:flex;align-items:center;gap:8px;padding:2px 6px 10px;}
  .sec-label .t{font-size:12px;font-weight:700;color:var(--ink-2);letter-spacing:1px;}
  .sec-label .c{margin-left:auto;font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums;}
  .rec-list{display:flex;flex-direction:column;gap:10px;}
  .rec-item{
    background:var(--card);
    -webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);
    border:1px solid var(--hair);border-radius:20px;box-shadow:var(--shadow-sm);overflow:hidden;
    transition:border-color .3s var(--ease), box-shadow .3s var(--ease);
  }
  .rec-item.open{border-color:var(--blue-line);box-shadow:0 14px 34px -14px rgba(10,132,255,.42);}
  .rec-row{display:flex;align-items:center;gap:12px;padding:14px 15px;cursor:pointer;user-select:none;}
  .rec-icon{
    width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;
    background:linear-gradient(150deg,rgba(10,132,255,.14),rgba(47,191,110,.12));
    border:1px solid var(--glass-border);color:var(--blue);transition:transform .34s var(--ease);
  }
  .rec-item.open .rec-icon{transform:rotate(-8deg) scale(1.06);}
  .rec-title{flex:1;min-width:0;font-size:15px;font-weight:700;color:var(--ink);letter-spacing:.2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rec-title.dim{color:var(--ink-3);font-weight:600;}
  .rec-chev{width:20px;height:20px;flex:none;color:var(--ink-3);transition:transform .34s var(--ease);margin-left:2px;}
  .rec-item.open .rec-chev{transform:rotate(90deg);color:var(--blue);}
  .rec-detail{overflow:hidden;height:0;transition:height 340ms var(--ease);}
  .rec-detail-pad{padding:0 15px 14px;}
  .rec-detail .field .k{width:80px;}
  .rec-detail .field:first-child{border-top:1px solid var(--hair);padding-top:11px;}

  /* 方式徽章 */
  .tag.mth-scrap{background:rgba(255,59,48,.13);color:#e5453b;border:1px solid rgba(255,59,48,.38);}
  .tag.mth-keep{background:var(--blue-soft);color:var(--blue);border:1px solid var(--blue-line);}
  html[data-theme="dark"] .tag.mth-scrap{color:#ff726a;}

  .older-wrap{display:none;}
  .older-wrap.show{display:block;animation:olderReveal .42s var(--ease);}
  @keyframes olderReveal{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:none;}}
  .older-list{padding-top:14px;display:flex;flex-direction:column;gap:10px;}

  .more-btn{
    width:100%;max-width:600px;margin:14px auto 0;display:flex;align-items:center;justify-content:center;gap:8px;
    padding:14px;border-radius:16px;border:1px solid var(--hair);background:var(--card);
    -webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);
    color:var(--ink-2);font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;
    box-shadow:var(--shadow-sm);
    transition:max-width .42s var(--ease), padding .3s var(--ease), background .3s, color .25s, border-color .25s, box-shadow .3s;
  }
  .more-btn:active{transform:scale(.99);}
  .more-btn .chev2{width:18px;height:18px;transition:transform .34s var(--ease);}
  /* 展開後：縮窄 + 實心藍，明顯區別於半透明的資料欄塊 */
  .more-btn.open{
    max-width:210px;padding:11px 18px;color:#fff;border-color:transparent;
    background:linear-gradient(140deg,var(--blue),#4aa3ff);
    box-shadow:0 12px 26px -8px rgba(10,132,255,.55), inset 0 1px 0 var(--glass-hi);
  }
  .more-btn.open .chev2{transform:rotate(180deg);}

  /* ── BOTTOM DOCK ── */
  .dock-wrap{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;justify-content:center;
    padding:0 16px calc(env(safe-area-inset-bottom) + 14px);pointer-events:none;}
  .dock{
    pointer-events:auto;display:flex;gap:6px;padding:7px;position:relative;overflow:hidden;
    background:var(--dock-bg);
    -webkit-backdrop-filter:saturate(210%) blur(34px);backdrop-filter:saturate(210%) blur(34px);
    border:1px solid var(--dock-border);border-radius:999px;
    box-shadow:0 20px 46px -12px rgba(31,58,95,.5), 0 2px 6px -2px rgba(31,58,95,.2),
               inset 0 1.5px 0 var(--glass-hi), inset 0 -7px 16px -8px rgba(0,0,0,.14);
  }
  /* 導覽列頂部反光 */
  .dock::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:linear-gradient(180deg, var(--glass-hi) 0%, rgba(255,255,255,0) 46%);opacity:.7;}
  .dock-btn{
    display:flex;align-items:center;gap:8px;border:none;background:transparent;cursor:pointer;
    padding:11px 20px;border-radius:999px;color:var(--ink-3);font-weight:700;font-size:13px;
    font-family:inherit;transition:color .25s;position:relative;
  }
  .dock-btn svg{width:20px;height:20px;}
  .dock-btn .lab{letter-spacing:.3px;}
  .dock-btn.active{color:#fff;}
  .dock-btn.active::before{
    content:"";position:absolute;inset:0;border-radius:999px;z-index:-1;
    background:linear-gradient(140deg,var(--blue),#4aa3ff);
    box-shadow:0 8px 20px -6px rgba(10,132,255,.7);
    animation:pop .3s var(--ease);
  }
  @keyframes pop{from{transform:scale(.82);opacity:.5;}to{transform:none;opacity:1;}}

  /* ── 密碼鎖 ── */
  body.locked{overflow:hidden;}

<script>
'use strict';
// 靜態快照（離線 / 即時讀取失敗時的後備）
const FALLBACK = window.INVENTORY_DATA || {blanks:[], s6012:{rows:[]}};
// Google Sheet 即時來源
const SHEET_ID   = '1lNGJ9hGziZYXHfUNbLFSqkyZB0bUFa0APvZL1QDbuSA';
const BLANKS_GID = '0';           // 基板現況分頁
const G6012_GID  = '57603327';    // 6012 使用紀錄分頁
let olderState = [];
let olderOpen  = false;

/* ── 密碼鎖 ── */
const PWD_HASH = '80bcbc8116c90758e6efd4740c94caab840d53dc3fe1ebe4003be10b67127eef';
async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function unlock(){
  const l=document.getElementById('lock'); if(l) l.style.display='none';
  document.body.classList.remove('locked');
}
async function checkPwd(){
  const h = await sha256(document.getElementById('lockInput').value);
  if(h===PWD_HASH){ localStorage.setItem('inv_auth', h); unlock(); }
  else {
    const e=document.getElementById('lockErr'); e.textContent='密碼錯誤，請重試';
    const i=document.getElementById('lockInput'); i.value=''; i.focus();
    setTimeout(()=>{ e.textContent=''; }, 3000);
  }
}
(function initAuth(){
  if(localStorage.getItem('inv_auth')===PWD_HASH){ unlock(); }
  else { document.body.classList.add('locked'); setTimeout(()=>{ const i=document.getElementById('lockInput'); if(i) i.focus(); },100); }
})();

const SUN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M19.1 4.9l-1.8 1.8M6.7 17.3l-1.8 1.8"/></svg>';
const MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg>';

function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function parseSize(spec){const m=(spec||'').match(/(\d+[Xx]\d+[Xx]\d+)/);return m?m[1].toUpperCase():null;}

/* ── 主題（兩頁共用切換鈕） ── */
function applyThemeIcon(){
  const t = document.documentElement.getAttribute('data-theme');
  document.querySelectorAll('.theme-btn').forEach(b=>b.innerHTML = (t==='dark') ? SUN : MOON);
  const meta = document.getElementById('themeColorMeta');
  if(meta) meta.setAttribute('content', t==='dark' ? '#0a0e18' : '#e7edf6');
}
document.querySelectorAll('.theme-btn').forEach(btn=>btn.addEventListener('click',()=>{
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur==='dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('inv_theme', next);
  applyThemeIcon();
}));
applyThemeIcon();

/* ── 批號卡 ── */
function thkText(t){t=(t||'').trim();return (t && t!=='-') ? esc(t)+' mm' : '—';}
function lotCard(b){
  const whCls = b.wh==='A倉'?'blue':'green';
  const car = (b.car||'').trim();
  const note = (b.note||'').trim();
  const pur = (b.pur||'').trim();
  const spec = (b.spec||'').trim();
  const expNo = (b.exp||'').trim()==='✘';
  return `
  <div class="lot-card">
    <div class="lot-top">
      <span class="tag ${whCls}">${esc(b.wh)}</span>
      ${car ? `<span class="tag carrier">${esc(car)}</span>` : ''}
      ${expNo ? `<span class="tag exp-no">未費用</span>` : ''}
    </div>
    <div class="fields">
      <div class="field"><span class="k">批號</span><span class="v mono">${esc(b.lot||'—')}</span></div>
      <div class="field"><span class="k">規格</span><span class="v">${esc(spec||'—')}</span></div>
      <div class="field"><span class="k">板厚</span><span class="v mono">${thkText(b.thk)}</span></div>
      <div class="field"><span class="k">用途</span><span class="v ${pur?'':'dim'}">${esc(pur||'—')}</span></div>
      <div class="field"><span class="k">備註</span><span class="v ${(note&&note!=='-')?'':'dim'}">${(note&&note!=='-')?esc(note):'—'}</span></div>
    </div>
  </div>`;
}

/* ── 建立主頁（可重複呼叫：靜態→即時） ── */
const listEl = document.getElementById('sizeList');
function buildBlanks(D){
  const valid = (D.blanks||[]).filter(b => b.wh==='A倉' || b.wh==='B倉');
  const groups = new Map();
  for(const b of valid){
    const k = parseSize(b.spec);
    if(!k) continue;
    if(!groups.has(k)) groups.set(k,[]);
    groups.get(k).push(b);
  }
  document.getElementById('totalNum').textContent = valid.length;
  document.getElementById('whA').textContent = valid.filter(b=>b.wh==='A倉').length;
  document.getElementById('whB').textContent = valid.filter(b=>b.wh==='B倉').length;

  const sortedKeys = [...groups.keys()].sort((a,b)=>{
    const [a1,a2,a3]=a.split('X').map(Number), [b1,b2,b3]=b.split('X').map(Number);
    return (a1-b1)||(a2-b2)||(a3-b3);
  });

  let html='';
  sortedKeys.forEach((k,i)=>{
  const items = groups.get(k);
  const a = items.filter(x=>x.wh==='A倉').length;
  const b = items.filter(x=>x.wh==='B倉').length;
  const t = a+b;
  const multi = items.length>1;
  const dots = multi ? `<div class="car-ctrl reveal">
        <button class="car-arrow prev" onclick="carNav(this,-1)" aria-label="上一片"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>
        <div class="dots">${items.map((_,j)=>`<span class="dot ${j===0?'on':''}"></span>`).join('')}</div>
        <button class="car-arrow next" onclick="carNav(this,1)" aria-label="下一片"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>
      </div>` : '';
  const hint = multi ? `<div class="swipe-hint reveal"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 5l-4 7 4 7M16 5l4 7-4 7"/></svg>左右滑動切換批號（共 ${items.length} 片）</div>` : '';
  html += `
  <div class="size-item" data-idx="${i}">
    <div class="size-row" onclick="toggleSize(${i})">
      <div class="size-icon">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M3 9h18M8 5v14"/></svg>
      </div>
      <div class="size-meta">
        <div class="size-name">${esc(k.replace(/X/g,'×'))}</div>
      </div>
      <div class="size-badges">
        <span class="mini blue ${a?'':'zero'}"><span class="lab">A</span>${a}</span>
        <span class="mini green ${b?'':'zero'}"><span class="lab">B</span>${b}</span>
        <span class="mini amber"><span class="lab">共</span>${t}</span>
      </div>
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
    </div>
    <div class="detail" data-idx="${i}">
      <div class="detail-pad">
        ${hint}
        <div class="carousel reveal" data-carousel="${i}">${items.map(lotCard).join('')}</div>
        ${dots}
      </div>
    </div>
  </div>`;
  });
  listEl.innerHTML = html;
  openIdx = -1;
  attachDots();
}

/* ── 展開 / 收合（height 動畫 + stagger，參考記帳網頁） ── */
let openIdx = -1;
function openSize(i){
  const item = listEl.querySelector(`.size-item[data-idx="${i}"]`);
  const det  = item.querySelector('.detail');
  const pad  = det.querySelector('.detail-pad');
  item.classList.add('open');
  det.style.height = pad.offsetHeight + 'px';
  const reveals = det.querySelectorAll('.reveal');
  // 用 setTimeout（背景分頁 rAF 會被凍結）逐項淡入
  reveals.forEach((el,j)=>setTimeout(()=>{el.style.opacity=1;el.style.transform='translateY(0)';}, 70 + j*55));
  openIdx = i;
  setTimeout(()=>item.scrollIntoView({behavior:'smooth',block:'nearest'}),140);
}
function closeSize(i){
  const item = listEl.querySelector(`.size-item[data-idx="${i}"]`);
  const det  = item.querySelector('.detail');
  item.classList.remove('open');
  det.querySelectorAll('.reveal').forEach(el=>{el.style.opacity=0;el.style.transform='translateY(8px)';});
  det.style.height = '0px';
  // 收合後把 carousel 捲回第一張
  const car = det.querySelector('.carousel');
  if(car) car.scrollLeft = 0;
  if(openIdx===i) openIdx = -1;
}
function toggleSize(i){
  if(openIdx===i){ closeSize(i); }
  else { if(openIdx!==-1) closeSize(openIdx); openSize(i); }
}

/* ── 批號輪播：箭頭切換（電腦版） ── */
function carNav(el, dir){
  const pad = el.closest('.detail-pad');
  const car = pad && pad.querySelector('.carousel');
  if(car) car.scrollBy({left: dir*car.clientWidth, behavior:'smooth'});
}

/* ── carousel dots / 箭頭狀態同步 ── */
function attachDots(){
  listEl.querySelectorAll('.carousel').forEach(car=>{
    const pad  = car.closest('.detail-pad');
    const dots = pad ? pad.querySelectorAll('.dot') : [];
    const prev = pad ? pad.querySelector('.car-arrow.prev') : null;
    const next = pad ? pad.querySelector('.car-arrow.next') : null;
    if(!dots.length && !prev) return;
    const update = ()=>{
      const idx = Math.round(car.scrollLeft / car.clientWidth);
      dots.forEach((d,j)=>d.classList.toggle('on', j===idx));
      if(prev) prev.classList.toggle('off', car.scrollLeft <= 2);
      if(next) next.classList.toggle('off', car.scrollLeft >= car.scrollWidth - car.clientWidth - 2);
    };
    let raf=null;
    car.addEventListener('scroll',()=>{
      if(raf) return;
      raf = requestAnimationFrame(()=>{ raf=null; update(); });
    },{passive:true});
    update();
  });
}

/* ════════════════════════════════════════
   PAGE 2 — 6012 使用紀錄
   ════════════════════════════════════════ */
// 時間解析 / 格式化
function tparse(str){
  const m=(str||'').match(/(\d{4})\/(\d{1,2})\/(\d{1,2})\s*(上午|下午)?\s*(\d{1,2}):(\d{2})(?::(\d{2}))?/);
  if(!m) return 0;
  let [,y,mo,dy,ap,h,mi,se]=m; h=+h; mi=+mi; se=+(se||0);
  if(ap==='下午'&&h!==12)h+=12; if(ap==='上午'&&h===12)h=0;
  return new Date(+y,+mo-1,+dy,h,mi,se).getTime();
}
function fmtTime(str){
  const m=(str||'').match(/(\d{4})\/(\d{1,2})\/(\d{1,2})\s*(上午|下午)?\s*(\d{1,2}):(\d{2})/);
  if(!m) return str||'—';
  const [,,mo,dy,ap,h,mi]=m;
  return `${mo}/${dy} ${ap||''} ${h}:${mi}`.replace(/\s+/g,' ').trim();
}
// 機台徽章（依機台上色）
function machTag(m){
  const t=(m||'').trim();
  const cls = t==='TI'?'blue' : t==='TC'?'green' : t==='TK'?'amber' : 'carrier';
  return `<span class="tag ${cls}">${esc(t||'—')}</span>`;
}
// 方式徽章
function methodTag(m){
  const t=(m||'').trim();
  if(t==='報廢') return `<span class="tag mth-scrap">報廢</span>`;
  if(t==='留存') return `<span class="tag mth-keep">留存</span>`;
  if(t==='退料') return `<span class="tag green">退料</span>`;
  if(t==='描畫') return `<span class="tag blue">描畫</span>`;
  return t ? `<span class="tag carrier">${esc(t)}</span>` : '';
}

function parseGen(g){
  const m=(g||'').match(/(\d{4})\/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2})/);
  if(!m) return null;
  const [,y,mo,dy,h,mi]=m; return new Date(+y,+mo-1,+dy,+h,+mi).getTime();
}

function recItem(r){
  const pat  = (r.pat||'').trim();
  const pm   = (r.pm ||'').trim();
  const note = (r.note||'').trim();
  const emp  = (r.emp||'').trim();
  // 標題 fallback：PM 項目 → 描畫 Pattern → 備註 → 方式 → 占位字
  const clean = s => { s=(s||'').trim(); return (s && s!=='-') ? s : ''; };
  const titleVal = clean(pm) || clean(pat) || clean(note) || clean(r.mth);
  const title = titleVal || '（無紀錄內容）';
  const hasPm = !!titleVal;
  return `
  <div class="rec-item">
    <div class="rec-row" onclick="toggleRec(this)">
      <div class="rec-icon">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2.5"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
      </div>
      <div class="rec-title ${hasPm?'':'dim'}">${esc(title)}</div>
      ${methodTag(r.mth)}
      <svg class="rec-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
    </div>
    <div class="rec-detail">
      <div class="rec-detail-pad">
        <div class="fields">
          <div class="field"><span class="k">人員工號</span><span class="v ${emp?'':'dim'}">${esc(emp||'—')}</span></div>
          <div class="field"><span class="k">時間</span><span class="v mono">${esc(fmtTime(r.time))}</span></div>
          <div class="field"><span class="k">機台</span><span class="v">${machTag(r.mch)}</span></div>
          <div class="field"><span class="k">描畫 Pattern</span><span class="v ${(pat&&pat!=='-')?'':'dim'}">${(pat&&pat!=='-')?esc(pat):'—'}</span></div>
          <div class="field"><span class="k">備註</span><span class="v ${(note&&note!=='-')?'':'dim'}">${(note&&note!=='-')?esc(note):'—'}</span></div>
        </div>
      </div>
    </div>
  </div>`;
}
function toggleRec(row){
  const item = row.closest('.rec-item');
  const det  = item.querySelector('.rec-detail');
  const willOpen = !item.classList.contains('open');
  // 手風琴：先收合其他已展開的紀錄（含近 7 天與更早清單）
  document.querySelectorAll('.rec-item.open').forEach(o=>{
    if(o!==item){ o.classList.remove('open'); o.querySelector('.rec-detail').style.height='0px'; }
  });
  if(willOpen){
    item.classList.add('open');
    det.style.height = det.querySelector('.rec-detail-pad').offsetHeight + 'px';
  } else {
    item.classList.remove('open');
    det.style.height = '0px';
  }
}

/* ── 建立 6012 頁（可重複呼叫：靜態→即時） ── */
function build6012(D){
  const S6 = D.s6012 || {rows:[]};
  document.getElementById('s6-unused').textContent = S6.unused!=null?S6.unused:'—';
  document.getElementById('s6-scrap').textContent  = S6.scrap!=null?S6.scrap:'—';

  // 排除「購入」，時間新→舊排序
  const recs = (S6.rows||[]).filter(r => (r.mth||'').trim() !== '購入');
  recs.sort((a,b)=>tparse(b.time)-tparse(a.time));

  // 近 7 天：以「最新一筆紀錄」為基準往回推（不受裝置時鐘影響）
  const times = recs.map(r=>tparse(r.time)).filter(Boolean);
  const refNow = times.length ? Math.max.apply(null, times) : (parseGen(D.generated) || Date.now());
  const weekAgo = refNow - 7*86400*1000;
  const recent = recs.filter(r => tparse(r.time) >= weekAgo);
  const older  = recs.filter(r => tparse(r.time) <  weekAgo);
  olderState = older;

  document.getElementById('recentCount').textContent = recent.length + ' 筆';
  document.getElementById('recentList').innerHTML =
    recent.length ? recent.map(recItem).join('') :
    `<div class="rec-item" style="text-align:center;color:var(--ink-3);font-size:13px;padding:16px;">近 7 天無紀錄</div>`;

  const moreBtn=document.getElementById('moreBtn');
  document.getElementById('moreLabel').textContent = `顯示更早的紀錄（${older.length} 筆）`;
  if(!older.length){ moreBtn.style.display='none'; document.getElementById('olderList').innerHTML=''; }
  else { moreBtn.style.display=''; document.getElementById('olderList').innerHTML = older.map(recItem).join(''); }
  // 重置更早區塊收合
  olderOpen=false;
  document.getElementById('olderWrap').classList.remove('show');
  moreBtn.classList.remove('open');
}

/* ════════════════════════════════════════
   Google Sheet 即時抓取（JSONP，支援 file:// 與 http://）
   ════════════════════════════════════════ */
function gvizToRows(response){
  const table = response.table;
  if(!table) return [];
  const headers = table.cols.map(c => (c.label||'').trim());
  const rows = [headers];
  for(const row of (table.rows||[])){
    if(!row || !row.c){ rows.push(headers.map(()=> '')); continue; }
    const cells = row.c.map((c2,i)=>{
      if(!c2 || c2.v===null || c2.v===undefined) return '';
      const ct = (table.cols[i]||{}).type || '';
      if(ct==='datetime'||ct==='date'||ct==='timeofday') return c2.f || '';
      return String(c2.v);
    });
    rows.push(cells);
  }
  while(rows.length>1 && rows[rows.length-1].every(c=>!c)) rows.pop();
  return rows;
}
function findCol(headers, keywords){
  const lh = headers.map(h => (h||'').toLowerCase().trim());
  for(const kw of keywords){ const k=kw.toLowerCase(); const i=lh.findIndex(h=>h===k); if(i!==-1) return i; }
  for(const kw of keywords){ const k=kw.toLowerCase(); const i=lh.findIndex(h=>h.includes(k)); if(i!==-1) return i; }
  return -1;
}
function fetchGVizJSON(sheetId, gid){
  return new Promise((resolve,reject)=>{
    const cb = 'inv_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
    const base = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq`;
    const gidParam = /^\d+$/.test(gid) ? `gid=${gid}` : `sheet=${encodeURIComponent(gid)}`;
    const url = `${base}?${gidParam}&tqx=out:json;responseHandler:${cb}`;
    const script = document.createElement('script');
    const timer = setTimeout(()=>{ cleanup(); reject(new Error('請求逾時')); }, 15000);
    function cleanup(){ clearTimeout(timer); try{ delete window[cb]; }catch(_){}; if(script.parentNode) script.parentNode.removeChild(script); }
    window[cb] = function(res){
      cleanup();
      if(!res || !res.table){ reject(new Error('SHEET_NOT_PUBLIC')); return; }
      if(res.status==='error'){ reject(new Error((res.errors||[]).map(e=>e.message).join('; ')||'SHEET_ERROR')); return; }
      resolve(gvizToRows(res));
    };
    script.onerror = ()=>{ cleanup(); reject(new Error('SCRIPT_LOAD_ERROR')); };
    script.src = url;
    document.head.appendChild(script);
  });
}
function cell(r,i){ return (i>=0 && r[i]!=null) ? String(r[i]) : ''; }
function mapBlanks(rows){
  const H = rows[0]||[];
  const cS=findCol(H,['規格','size','尺寸']);
  const cL=findCol(H,['metal lot','批號','lot']);
  const cW=findCol(H,['庫別','倉庫','warehouse']);
  const cC=findCol(H,['載具','carrier']);
  const cP=findCol(H,['使用目的','目的','purpose','用途']);
  const cN=findCol(H,['備註','note']);
  const cT=findCol(H,['板厚','thickness','thk']);
  const cE=findCol(H,['費用化','exp']);
  const out=[];
  for(const r of rows.slice(1)){
    const wh=cell(r,cW).trim();
    if(wh!=='A倉' && wh!=='B倉') continue;
    out.push({ lot:cell(r,cL), spec:cell(r,cS), wh, car:cell(r,cC), thk:cell(r,cT), pur:cell(r,cP), note:cell(r,cN), exp:cell(r,cE) });
  }
  return out;
}
function map6012(rows){
  const H = rows[0]||[];
  const hB = H[1]||'';
  const mu = hB.match(/未使用庫存[：:]\s*(\d+)\s*片/);
  const ms = hB.match(/可報廢[：:]\s*(\d+)\s*片/);
  const cEmp=findCol(H,['人員工號','工號','employee']);
  const cTime=findCol(H,['時間','time']);
  const cMth=findCol(H,['方式','method','type']);
  const cMch=findCol(H,['機台','machine']);
  const cPat=findCol(H,['描畫 pattern','pattern','描畫']);
  const cPM=findCol(H,['pm 項目','pm項目','pm']);
  const cNote=findCol(H,['備註','note']);
  const rowsOut = rows.slice(1).filter(r=>r.some(c=>(c||'').toString().trim())).map(r=>({
    emp:cell(r,cEmp), time:cell(r,cTime), mth:cell(r,cMth), mch:cell(r,cMch),
    pat:cell(r,cPat), pm:cell(r,cPM), note:cell(r,cNote)
  }));
  return { unused: mu?+mu[1]:null, scrap: ms?+ms[1]:null, rows: rowsOut };
}

/* ── 一次建立兩頁 ── */
function build(D){ buildBlanks(D); build6012(D); }
function setUpdated(txt){
  document.getElementById('updated').textContent = txt;
  document.getElementById('updated6012').textContent = txt;
}
function nowStr(){ const d=new Date(), p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }

/* ── 更早紀錄 toggle（綁定一次） ── */
document.getElementById('moreBtn').addEventListener('click',()=>{
  olderOpen=!olderOpen;
  document.getElementById('moreBtn').classList.toggle('open', olderOpen);
  document.getElementById('olderWrap').classList.toggle('show', olderOpen);
  document.getElementById('moreLabel').textContent =
    olderOpen ? '收起更早的紀錄' : `顯示更早的紀錄（${olderState.length} 筆）`;
});

/* ── 收合所有展開欄塊（切頁時呼叫） ── */
function collapseAll(){
  listEl.querySelectorAll('.size-item.open').forEach(it=>{
    it.classList.remove('open');
    const det=it.querySelector('.detail');
    det.querySelectorAll('.reveal').forEach(el=>{el.style.opacity=0;el.style.transform='translateY(8px)';});
    det.style.height='0px';
    const car=det.querySelector('.carousel'); if(car) car.scrollLeft=0;
  });
  openIdx=-1;
  document.querySelectorAll('.rec-item.open').forEach(it=>{
    it.classList.remove('open');
    it.querySelector('.rec-detail').style.height='0px';
  });
  olderOpen=false;
  const ow=document.getElementById('olderWrap'); if(ow) ow.classList.remove('show');
  const mb=document.getElementById('moreBtn'); if(mb) mb.classList.remove('open');
  const ml=document.getElementById('moreLabel'); if(ml) ml.textContent=`顯示更早的紀錄（${olderState.length} 筆）`;
}

/* ── 分頁切換（底部 dock 與左側邊欄同步，綁定一次） ── */
function switchPage(p){
  collapseAll();
  document.querySelectorAll('.dock-btn, .nav-item').forEach(b=>b.classList.toggle('active', b.dataset.page===p));
  document.querySelectorAll('.page').forEach(pg=>pg.classList.toggle('active', pg.id==='page-'+p));
  window.scrollTo({top:0,behavior:'smooth'});
}
document.querySelectorAll('.dock-btn, .nav-item').forEach(btn=>{
  btn.addEventListener('click',()=> switchPage(btn.dataset.page));
});

/* ── 左右滑動切換分頁（基板 ⇄ 6012） ── */
const PAGE_ORDER = ['blanks','6012'];
let _swX=0,_swY=0,_swOnCarousel=false,_swTracking=false;
document.addEventListener('touchstart',e=>{
  if(e.touches.length!==1){ _swTracking=false; return; }
  const t=e.touches[0];
  _swX=t.clientX; _swY=t.clientY;
  // 起點若在批號輪播內 → 交給輪播處理，不切頁
  _swOnCarousel = !!(e.target.closest && e.target.closest('.carousel'));
  _swTracking=true;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!_swTracking) return; _swTracking=false;
  if(_swOnCarousel) return;
  if(document.body.classList.contains('locked')) return;   // 密碼鎖顯示時不切頁
  const t=e.changedTouches[0];
  const dx=t.clientX-_swX, dy=t.clientY-_swY;
  if(Math.abs(dx)<60) return;                 // 位移太小
  if(Math.abs(dx)<Math.abs(dy)*1.4) return;   // 不夠水平（避免與上下捲動衝突）
  const curEl=document.querySelector('.page.active');
  if(!curEl) return;
  let idx=PAGE_ORDER.indexOf(curEl.id.replace('page-',''));
  idx += (dx<0) ? 1 : -1;                      // 左滑→下一頁；右滑→上一頁
  if(idx<0 || idx>=PAGE_ORDER.length) return;
  switchPage(PAGE_ORDER[idx]);
},{passive:true});

/* ── 即時抓取（初次載入 & 重新整理鈕共用） ── */
function loadLive(){
  document.querySelectorAll('.refresh-btn').forEach(b=>b.classList.add('spinning'));
  return Promise.all([ fetchGVizJSON(SHEET_ID, BLANKS_GID), fetchGVizJSON(SHEET_ID, G6012_GID) ])
    .then(([bRows, sRows])=>{
      const live = { blanks: mapBlanks(bRows), s6012: map6012(sRows) };
      build(live);   // 重建 → 所有欄塊回到未展開
      setUpdated('即時更新 · ' + nowStr());
    })
    .catch(err=>{
      setUpdated('靜態快照 · ' + (FALLBACK.generated || '—') + '（即時讀取失敗）');
      console.warn('[即時讀取失敗]', err && err.message);
    })
    .finally(()=>{
      document.querySelectorAll('.refresh-btn').forEach(b=>b.classList.remove('spinning'));
    });
}
document.querySelectorAll('.refresh-btn').forEach(b=>b.addEventListener('click', loadLive));

/* ════════════════════════════════════════
   初始化：先用靜態快照秒開，再抓即時資料覆蓋
   ════════════════════════════════════════ */
build(FALLBACK);
setUpdated('最後更新 ' + (FALLBACK.generated || '—') + ' · 讀取即時中…');
loadLive();
</script>
